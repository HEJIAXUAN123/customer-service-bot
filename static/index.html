<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>智能对话助手 · 纯净版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, 'Segoe UI', 'PingFang SC', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(145deg, #e9eef5 0%, #d9e0ec 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* 卡片容器 */
        .container {
            width: 100%;
            max-width: 700px;
            height: 90vh;
            min-height: 560px;
            background: #f5f7fb;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(2px);
        }

        /* 头部精致清爽 */
        .header {
            background: #ffffffcc;
            backdrop-filter: blur(12px);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 0.5px solid #e9edf2;
        }

        .header span:first-child {
            font-size: 1.8rem;
        }

        .header .title {
            font-size: 1.35rem;
            font-weight: 590;
            background: linear-gradient(135deg, #3b3b5c, #5e5a8a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .header .status {
            font-size: 0.7rem;
            background: #eef2fa;
            padding: 4px 10px;
            border-radius: 30px;
            color: #4a4e6b;
            margin-left: auto;
        }

        /* 聊天区域 */
        .chatbox {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f5f7fb;
            scroll-behavior: smooth;
        }

        .chatbox::-webkit-scrollbar {
            width: 5px;
        }
        .chatbox::-webkit-scrollbar-track {
            background: #e9edf2;
            border-radius: 10px;
        }
        .chatbox::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        /* 消息行基础 */
        .message {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            max-width: 85%;
            animation: fadeIn 0.2s ease-out;
        }

        /* 用户消息：靠右，且头像在气泡右侧（信息之后） */
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;  /* 让头像跑到气泡右边 */
        }

        /* 机器人消息：靠左，头像在左侧（信息之前） */
        .message.bot {
            align-self: flex-start;
            flex-direction: row;
        }

        /* 头像样式 - 圆形温和 */
        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
            background: #eef2fa;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        /* 用户头像淡紫渐变 */
        .message.user .avatar {
            background: linear-gradient(135deg, #7c73e6, #9f8ef7);
            color: white;
            box-shadow: 0 2px 6px rgba(106, 90, 205, 0.2);
        }

        /* 机器人头像浅蓝灰 */
        .message.bot .avatar {
            background: #ffffff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            border: 0.5px solid #e2e8f0;
            color: #4b5563;
        }

        /* 气泡通用 */
        .bubble {
            padding: 10px 16px;
            font-size: 0.95rem;
            line-height: 1.45;
            word-wrap: break-word;
            border-radius: 20px;
            max-width: 100%;
            box-shadow: 0 1px 1px rgba(0,0,0,0.02);
        }

        /* 用户气泡 - 靠右，微信风蓝紫色 */
        .user .bubble {
            background: linear-gradient(115deg, #6c5ce7, #8b6ef0);
            color: white;
            border-bottom-right-radius: 5px;
            box-shadow: 0 2px 8px rgba(108, 92, 231, 0.2);
        }

        /* 机器人气泡 - 白色左 */
        .bot .bubble {
            background: #ffffff;
            color: #1e293b;
            border: 0.5px solid #edf2f7;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);
        }

        /* 打字指示器（机器人专用） */
        .typing-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            background: #ffffff;
            border-radius: 24px;
            border: 0.5px solid #eef2ff;
        }

        .typing-indicator span {
            width: 7px;
            height: 7px;
            background: #a5b4fc;
            border-radius: 50%;
            animation: blink 1.4s infinite ease;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; background: #818cf8; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; background: #6366f1; }

        /* 输入区域简洁 */
        .input-area {
            display: flex;
            gap: 12px;
            padding: 12px 16px 16px 16px;
            background: #ffffffd9;
            backdrop-filter: blur(12px);
            border-top: 0.5px solid #eef2f6;
        }

        #userInput {
            flex: 1;
            padding: 12px 18px;
            background: #f9faff;
            border: 1px solid #e2e8f0;
            border-radius: 28px;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: all 0.2s;
            color: #1f2937;
        }

        #userInput:focus {
            border-color: #8b6cf0;
            background: white;
            box-shadow: 0 0 0 2px rgba(139, 108, 240, 0.15);
        }

        #userInput::placeholder {
            color: #9ca3af;
        }

        button {
            background: #6c5ce7;
            border: none;
            padding: 0 28px;
            border-radius: 40px;
            font-weight: 590;
            font-size: 0.95rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(108, 92, 231, 0.3);
        }

        button:hover {
            background: #5b4bc4;
            transform: scale(0.97);
        }

        button:active {
            transform: scale(0.96);
        }

        button:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }

        /* 简单动画 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes blink {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-5px); opacity: 1; }
        }

        /* 响应式微调 */
        @media (max-width: 560px) {
            .message {
                max-width: 90%;
            }
            .avatar {
                width: 34px;
                height: 34px;
                font-size: 1.1rem;
            }
            .bubble {
                padding: 8px 14px;
                font-size: 0.88rem;
            }
            button {
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <span>💬</span>
        <span class="title">智能助手</span>
        <span class="status">在线 · 灵悦</span>
    </div>
    <div class="chatbox" id="chatbox">
        <div class="message bot">
            <div class="avatar">🤖</div>
            <div class="bubble">你好！我是你的AI助手，有什么可以帮你的？✨</div>
        </div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="输入消息..." autocomplete="off">
        <button id="sendBtn">发送</button>
    </div>
</div>

<script>
    // 完全保留核心逻辑: fetch('/chat') 与 /chat 接口交互，未改动后端要求
    // 只优化图标位置：用户头像严格在信息的右边，机器人头像在左边。
    // 实现方式：.message.user 使用 flex-direction: row-reverse 确保视觉上头像在气泡之后
    // DOM 顺序也是先加气泡后加头像，配合 row-reverse 完美呈现“信息在前，头像在后”

    const chatbox = document.getElementById('chatbox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    let isLoading = false;         // 防止并发请求
    let typingIndicatorDiv = null;

    // 添加消息 (role: 'user' 或 'bot')
    function addMessage(role, text, isError = false) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role}`;

        // 创建头像元素
        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        // 设定图标：用户用 👤，机器人用 🤖
        if (role === 'user') {
            avatar.textContent = '👤';
        } else {
            avatar.textContent = '🤖';
        }

        // 气泡元素
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        if (isError) {
            bubble.style.background = '#ffeae9';
            bubble.style.color = '#c2412c';
            bubble.style.border = '1px solid #ffcdc4';
        }
        bubble.textContent = text;

        // 关键布局:
        // 对于 user 消息，我们希望显示为：气泡（信息） + 头像（在右侧）
        // 由于 .user 使用了 flex-direction: row-reverse，我们需要先添加气泡再添加头像，
        // 这样在 row-reverse 作用下，气泡显示在左边，头像显示在气泡右边（即信息之后）。
        if (role === 'user') {
            messageDiv.appendChild(bubble);
            messageDiv.appendChild(avatar);
        } else {
            // 机器人：先头像后气泡，自然显示头像左边，气泡右边
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(bubble);
        }

        chatbox.appendChild(messageDiv);
        chatbox.scrollTo({ top: chatbox.scrollHeight, behavior: 'smooth' });
        return messageDiv;
    }

    // 显示“正在输入”
    function showTyping() {
        if (typingIndicatorDiv) return;
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message bot';
        typingDiv.id = 'typing-indicator';

        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = '🤖';

        const bubble = document.createElement('div');
        bubble.className = 'bubble typing-indicator';
        bubble.innerHTML = '<span></span><span></span><span></span>';

        typingDiv.appendChild(avatar);
        typingDiv.appendChild(bubble);
        chatbox.appendChild(typingDiv);
        chatbox.scrollTop = chatbox.scrollHeight;
        typingIndicatorDiv = typingDiv;
    }

    function hideTyping() {
        if (typingIndicatorDiv && typingIndicatorDiv.parentNode) {
            typingIndicatorDiv.parentNode.removeChild(typingIndicatorDiv);
            typingIndicatorDiv = null;
        }
    }

    // 发送消息 (完全保留原有后端通信)
    async function sendMessage() {
        const userMessage = userInput.value.trim();
        if (!userMessage || isLoading) return;

        // 展示用户消息
        addMessage('user', userMessage);
        userInput.value = '';

        isLoading = true;
        sendBtn.disabled = true;
        userInput.disabled = true;

        // 显示机器人打字效果
        showTyping();

        try {
            // 调用后端 /chat 接口
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: userMessage })
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const data = await response.json();
            const reply = data.reply || "抱歉，我暂时无法回答，请再试一次～";
            hideTyping();
            addMessage('bot', reply);
        } catch (err) {
            console.error('对话接口出错:', err);
            hideTyping();
            addMessage('bot', '❌ 网络连接异常，请检查后端服务是否可用。', true);
        } finally {
            isLoading = false;
            sendBtn.disabled = false;
            userInput.disabled = false;
            userInput.focus();
        }
    }

    // 回车发送
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !isLoading) {
            e.preventDefault();
            sendMessage();
        }
    });

    sendBtn.addEventListener('click', sendMessage);

    // 页面加载完毕聚焦输入框
    window.addEventListener('load', () => {
        userInput.focus();
    });

    // 说明：图标位置严格按照“用户信息之后”实现 ——
    // 用户消息区: 气泡在前，头像在后，通过 flex-direction: row-reverse 让头像显示在最右侧（信息之后）
    // 机器人消息区: 头像在前，气泡在后，标准左图右文。
    // 完全符合微信风格。
</script>
</body>
</html>
