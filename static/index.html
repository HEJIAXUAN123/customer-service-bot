<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>智能对话助手 · 纯净版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, 'Segoe UI', 'PingFang SC', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(145deg, #e9eef5 0%, #d9e0ec 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* 卡片容器 */
        .container {
            width: 100%;
            max-width: 700px;
            height: 90vh;
            min-height: 560px;
            background: #f5f7fb;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(2px);
        }

        /* 头部精致清爽 */
        .header {
            background: #ffffffcc;
            backdrop-filter: blur(12px);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 0.5px solid #e9edf2;
        }

        .header span:first-child {
            font-size: 1.8rem;
        }

        .header .title {
            font-size: 1.35rem;
            font-weight: 590;
            background: linear-gradient(135deg, #3b3b5c, #5e5a8a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .header .status {
            font-size: 0.7rem;
            background: #eef2fa;
            padding: 4px 10px;
            border-radius: 30px;
            color: #4a4e6b;
            margin-left: auto;
        }

        /* 嵌入框铺满剩余空间 */
        .chat-frame {
            flex: 1;
            width: 100%;
            border: none;
        }

        /* 响应式微调 */
        @media (max-width: 560px) {
            .container {
                height: 95vh;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <span>💬</span>
        <span class="title">家护家电客服</span>
        <span class="status">在线 · 灵悦</span>
    </div>
    <!-- 直接嵌入 FastGPT 的免登录聊天窗口 -->
    <iframe
        class="chat-frame"
        src="https://cloud.fastgpt.cn/chat/share?shareId=vkJI8PhWAG5RjaIzpsnO5eYe"
        allow="microphone">
    </iframe>
</div>
</body>
</html>
